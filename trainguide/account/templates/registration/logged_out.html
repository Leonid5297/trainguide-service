{% extends "base.html" %}
{% load static %}

{% block title %}Вы вышли — TrainGuide{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-80px)] flex items-center justify-center py-12 px-6">
<div class="w-full max-w-md text-center">

  <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-100 rounded-2xl mb-6">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#64748B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
      <polyline points="16 17 21 12 16 7"/>
      <line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
  </div>

  <h1 class="text-[28px] font-black tracking-tight text-slate-900 mb-2">Вы вышли из аккаунта</h1>
  <p class="text-slate-500 text-sm font-medium mb-8">До скорой встречи! Ваши тренировки ждут вас.</p>

  <div class="bg-white border border-slate-100 rounded-3xl shadow-sm p-8 space-y-4">
    <a href="{% url 'login' %}"
       class="flex items-center justify-center gap-2 w-full py-3.5 rounded-xl bg-[#0088CC] hover:bg-[#0077bb] transition-colors text-white text-[13px] font-black uppercase tracking-widest">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Войти снова
    </a>
    <a href="{% url 'home' %}"
       class="flex items-center justify-center gap-2 w-full py-3.5 rounded-xl bg-slate-50 hover:bg-slate-100 transition-colors text-slate-500 text-[13px] font-bold uppercase tracking-widest">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      На главную
    </a>
  </div>

</div>
</div>
{% endblock %}
