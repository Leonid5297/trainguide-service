{% extends "base.html" %}
{% load static %}

{% block title %}Пароль сброшен — TrainGuide{% endblock %}

{% block content %}
<div class="min-h-[calc(100vh-80px)] flex items-center justify-center py-12 px-6">
<div class="w-full max-w-md text-center">

  <div class="inline-flex items-center justify-center w-16 h-16 bg-emerald-50 rounded-2xl mb-6">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
      <polyline points="22 4 12 14.01 9 11.01"/>
    </svg>
  </div>

  <h1 class="text-[28px] font-black tracking-tight text-slate-900 mb-2">Готово!</h1>
  <p class="text-slate-500 text-sm font-medium leading-relaxed mb-8">
    Ваш пароль успешно сброшен.<br/>
    Теперь войдите с новым паролем.
  </p>

  <div class="bg-white border border-slate-100 rounded-3xl shadow-sm p-8 space-y-4">
    <div class="px-4 py-3.5 bg-emerald-50 border border-emerald-100 rounded-2xl flex items-center gap-3">
      <svg class="flex-shrink-0" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <span class="text-[13px] font-semibold text-emerald-700">Пароль успешно обновлён</span>
    </div>
    <a href="{% url 'login' %}"
       class="flex items-center justify-center gap-2 w-full py-3.5 rounded-xl bg-[#0088CC] hover:bg-[#0077bb] transition-colors text-white text-[13px] font-black uppercase tracking-widest">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Войти в аккаунт
    </a>
    <a href="{% url 'home' %}"
       class="flex items-center justify-center w-full py-3.5 rounded-xl bg-slate-50 hover:bg-slate-100 transition-colors text-slate-500 text-[13px] font-bold uppercase tracking-widest">
      На главную
    </a>
  </div>

</div>
</div>
{% endblock %}
